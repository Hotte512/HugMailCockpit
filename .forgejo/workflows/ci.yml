# Forgejo Actions workflow.
# Runner prerequisites (same as the other Hug plugins):
#  - Label "ubuntu-latest" mapped to a full Ubuntu image
#    (e.g. catthehacker/ubuntu:act-latest) so setup-php can install PHP.
#  - Actions are referenced by full URL (independent of DEFAULT_ACTIONS_URL).
name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3' ]

    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Setup PHP
        uses: https://github.com/shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, iconv
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: ECS (coding standard)
        run: vendor/bin/ecs check --no-progress-bar

      - name: PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon --no-progress

      - name: PHPUnit
        run: vendor/bin/phpunit -c phpunit.xml.dist
